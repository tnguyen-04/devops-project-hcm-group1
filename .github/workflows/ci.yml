name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Initialize test database schema
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: app_test
        run: |
          node <<'NODE'
          const { Pool } = require('pg');

          const pool = new Pool({
            host: process.env.DB_HOST,
            port: Number(process.env.DB_PORT),
            user: process.env.DB_USER,
            password: process.env.DB_PASSWORD,
            database: process.env.DB_NAME
          });

          const createSql = `
            CREATE TABLE IF NOT EXISTS todos (
              id SERIAL PRIMARY KEY,
              title VARCHAR(255) NOT NULL,
              completed BOOLEAN DEFAULT false,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            );
          `;

          (async () => {
            for (let i = 1; i <= 20; i++) {
              try {
                await pool.query(createSql);
                console.log('Database schema is ready');
                await pool.end();
                return;
              } catch (err) {
                if (i === 20) throw err;
                await new Promise((r) => setTimeout(r, 2000));
              }
            }
          })()
            .catch(async (err) => {
              console.error('Failed to initialize DB schema:', err.message);
              await pool.end();
              process.exit(1);
            });
          NODE

      - name: Run backend tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: app_test
        run: npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-frontend:latest -f frontend/Dockerfile ./frontend

      - name: Build backend Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-backend:latest -f backend/Dockerfile ./backend

      - name: Push frontend Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-frontend:latest

      - name: Push backend Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/devops-group1-backend:latest
